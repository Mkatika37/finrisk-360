# ============================================================
# finrisk-360  —  Docker Compose (local development)
# ============================================================
version: "3.9"

services:
  # ── Kafka + Zookeeper ────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── PostgreSQL (Airflow metadata + app database) ─────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finrisk
      POSTGRES_PASSWORD: finrisk_dev
      POSTGRES_DB: finrisk_meta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Kafdrop (Kafka UI) ──────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    restart: unless-stopped

  # ── Airflow — DB init (one-shot migration) ───────────────
  airflow-init:
    image: apache/airflow:2.8.1
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://finrisk:finrisk_dev@postgres:5432/finrisk_meta
      AIRFLOW__WEBSERVER__SECRET_KEY: "finrisk_360_secret_key_1234567890"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
          airflow users create
            --username admin
            --password admin
            --firstname Admin
            --lastname User
            --role Admin
            --email admin@finrisk360.io || true"

  # ── Airflow Webserver ────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://finrisk:finrisk_dev@postgres:5432/finrisk_meta
      AIRFLOW__WEBSERVER__SECRET_KEY: "finrisk_360_secret_key_1234567890"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        fredapi
        kafka-python
        boto3
        alpha_vantage
        python-dotenv
        pandas
        requests
        snowflake-connector-python
        dbt-core
        dbt-snowflake
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
      - ./producers:/opt/airflow/producers
      - ./.env:/opt/airflow/.env
      - ./ingestion/kinesis_bridge.py:/opt/airflow/kinesis_bridge.py
      - ./finrisk_dbt:/opt/airflow/finrisk_dbt
    ports:
      - "8080:8080"
    command: webserver
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Airflow Scheduler ───────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://finrisk:finrisk_dev@postgres:5432/finrisk_meta
      AIRFLOW__WEBSERVER__SECRET_KEY: "finrisk_360_secret_key_1234567890"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        fredapi
        kafka-python
        boto3
        alpha_vantage
        python-dotenv
        pandas
        requests
        snowflake-connector-python
        dbt-core
        dbt-snowflake
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
      - ./producers:/opt/airflow/producers
      - ./.env:/opt/airflow/.env
      - ./ingestion/kinesis_bridge.py:/opt/airflow/kinesis_bridge.py
      - ./finrisk_dbt:/opt/airflow/finrisk_dbt
    command: scheduler
    restart: on-failure

  # ── Grafana (monitoring dashboard) ──────────────────────
  grafana:
    image: grafana/grafana:latest
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  # ── FastAPI service ──────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - kafka
      - postgres

volumes:
  pgdata:
  airflow-logs:
  grafana-data:
  kafka_data:
    driver: local
