name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic fastapi httpx boto3
          
      - name: Run all tests
        run: |
          python -m pytest tests/ -v --tb=short
          
      - name: Verify project structure
        run: |
          echo "Checking required files exist..."
          test -f README.md && echo "README.md ✅"
          test -f requirements.txt && echo "requirements.txt ✅"
          test -f docker-compose.yml && echo "docker-compose.yml ✅"
          test -f .env.example && echo ".env.example ✅"
          test -f terraform/main.tf && echo "terraform/main.tf ✅"
          test -f api/main.py && echo "api/main.py ✅"
          test -f dashboard/app.py && echo "dashboard/app.py ✅"
          echo "All required files present ✅"
          
      - name: Notify deployment ready
        run: |
          echo "🚀 FinRisk 360 is ready for deployment!"
          echo "Pipeline: Kafka → Kinesis → S3 → Glue → Snowflake"
          echo "Dashboard: Streamlit + FastAPI"
