name: CD — FinRisk 360

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Production Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi uvicorn pydantic

      - name: Run all tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify Terraform files
        run: |
          test -f terraform/main.tf && echo "✅ main.tf"
          test -f terraform/s3.tf && echo "✅ s3.tf"
          test -f terraform/kinesis.tf && echo "✅ kinesis.tf"
          test -f terraform/lambda.tf && echo "✅ lambda.tf"
          test -f terraform/glue_catalog.tf && echo "✅ glue_catalog.tf"
          test -f terraform/eventbridge.tf && echo "✅ eventbridge.tf"
          test -f terraform/cloudwatch_dashboard.tf && echo "✅ cloudwatch.tf"
          echo "✅ All Terraform files verified"

      - name: Verify Airflow DAGs
        run: |
          test -f airflow/dags/finrisk_dag.py
          test -f airflow/dags/finrisk360_alerting_dag.py
          test -f airflow/dags/finrisk360_data_quality_dag.py
          test -f airflow/dags/finrisk360_model_refresh_dag.py
          test -f airflow/dags/finrisk360_archival_dag.py
          echo "✅ All 5 Airflow DAGs present"

      - name: Verify requirements files
        run: |
          test -f requirements.txt && echo "✅ requirements.txt"
          test -f requirements-api.txt && echo "✅ requirements-api.txt"
          test -f requirements-dashboard.txt && echo "✅ requirements-dashboard.txt"
          test -f requirements-dev.txt && echo "✅ requirements-dev.txt"
          echo "✅ All requirements files present"

      - name: Final summary
        run: |
          echo "================================"
          echo "🚀 FinRisk 360 CD Complete!"
          echo "✅ All tests passing"
          echo "✅ Terraform verified"
          echo "✅ Airflow DAGs verified"
          echo "✅ Ready for production!"
          echo "================================"
