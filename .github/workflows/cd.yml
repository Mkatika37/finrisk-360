name: CD — FinRisk 360

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate & Deploy Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify Terraform files
        run: |
          test -f terraform/main.tf
          test -f terraform/s3.tf
          test -f terraform/kinesis.tf
          test -f terraform/lambda.tf
          test -f terraform/glue_catalog.tf
          test -f terraform/eventbridge.tf
          test -f terraform/cloudwatch_dashboard.tf
          echo "✅ All Terraform files present"

      - name: Verify dbt models
        run: |
          test -f finrisk_dbt/models/staging/stg_loan_risk_scores.sql
          test -f finrisk_dbt/models/marts/mart_risk_summary.sql
          test -f finrisk_dbt/models/marts/mart_high_risk_loans.sql
          test -f finrisk_dbt/models/marts/mart_daily_risk_trend.sql
          echo "✅ All dbt models present"

      - name: Verify Airflow DAGs
        run: |
          test -f airflow/dags/finrisk_dag.py
          test -f airflow/dags/finrisk360_alerting_dag.py
          test -f airflow/dags/finrisk360_data_quality_dag.py
          test -f airflow/dags/finrisk360_model_refresh_dag.py
          test -f airflow/dags/finrisk360_archival_dag.py
          echo "✅ All Airflow DAGs present"

      - name: Pipeline ready notification
        run: |
          echo "🚀 FinRisk 360 pipeline validation complete!"
          echo "✅ Tests passing"
          echo "✅ All files verified"
          echo "✅ Ready for production"
