name: CI

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic fastapi httpx
          
      - name: Run risk scoring tests
        run: |
          python -m pytest tests/test_risk_scoring.py -v
          
      - name: Validate terraform files
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          
      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
          
      - name: Check Python syntax
        run: |
          python -m py_compile producers/hmda_producer.py
          python -m py_compile producers/fred_producer.py
          python -m py_compile api/main.py
          python -m py_compile dashboard/app.py
          echo "All Python files syntax OK"
