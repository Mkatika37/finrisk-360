name: CI — FinRisk 360

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run risk scoring unit tests
        run: |
          python -m pytest tests/test_risk_scoring.py -v

      - name: Check Python syntax — producers
        run: |
          python -m py_compile producers/fred_producer.py
          python -m py_compile producers/alpha_vantage_producer.py
          python -m py_compile producers/census_producer.py
          echo "✅ All producer files syntax OK"

      - name: Check Python syntax — API
        run: |
          python -m py_compile api/main.py
          echo "✅ API syntax OK"

      - name: Verify project structure
        run: |
          test -f README.md
          test -f requirements.txt
          test -f docker-compose.yml
          test -f .env.example
          test -f terraform/main.tf
          test -f api/main.py
          test -f dashboard/app.py
          echo "✅ All required files present"
